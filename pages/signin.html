<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Studycademia</title>
    <!-- Pastikan pautan CSS keluar dari folder pages -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { font-size: 1.5rem; color: var(--purple-900); margin-bottom: 0.5rem; }
        .auth-header p { font-size: 0.875rem; color: var(--text-secondary); }
        .auth-form .form-group { margin-bottom: 1.25rem; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-inner">
            <a href="../index.html" class="nav-logo">Studycademia</a>
        </div>
    </nav>

    <main class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to access your UTHM study materials</p>
            </div>
            
            <form class="auth-form" action="mylibrary.html">
                <div class="form-group">
                    <label class="form-label">Email Address / Matrix No.</label>
                    <input type="text" class="form-input" placeholder="e.g. ai210000@student.uthm.edu.my" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="#">Create one</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-inner">
            <span class="footer-copy">© 2026 Studycademia · UTHM</span>
        </div>
    </footer>
</body>
</html>
